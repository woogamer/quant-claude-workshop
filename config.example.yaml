# 한국투자증권 모의투자 계정 정보
# 발급 방법: https://apiportal.koreainvestment.com/ → 모의투자 신청 → API 키 발급
#
# 주의: 이 파일을 복사해서 config.yaml 로 저장한 뒤 키를 채워넣으세요.
#       config.yaml 은 .gitignore 에 등록되어 있어 커밋되지 않습니다.

kis:
  app_key: "YOUR_APP_KEY_HERE"
  app_secret: "YOUR_APP_SECRET_HERE"
  # 계좌번호 형식: 8자리-2자리 (예: "50012345-01")
  account_no: "YOUR_ACCOUNT_NO_HERE"

# DART OpenAPI (선택, Phase 2b 데모에서 사용)
# 발급: https://opendart.fss.or.kr/ → 인증키 신청
dart:
  api_key: "YOUR_DART_API_KEY_HERE"
